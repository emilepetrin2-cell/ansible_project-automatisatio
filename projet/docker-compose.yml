
services:
  backend:
    build: ./backend
    container_name: ansible_backend
    restart: always
    volumes:
      - ./backups:/app/backups
      - /etc/ansible:/etc/ansible
    ports:
      - "8000:8000"

  frontend:
    build: ./switch-orchestrator
    container_name: ansible_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend