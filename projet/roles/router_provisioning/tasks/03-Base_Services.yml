---
# /home/elpetrino/projet/roles/router_provisioning/tasks/03-Base_Services.yml
- name: Configuration du Hostname de l'appareil
  cisco.ios.ios_hostname:
    config:
      hostname: "{{ hostname }}"
  when: hostname is defined and hostname | length > 0 

- name: Configuration fine de NTP
  cisco.ios.ios_ntp_global:
    config:
      servers:
        - server: "{{ ntp_server }}"
          prefer: true
    state: merged

- name: Configuration du fuseau horaire
  cisco.ios.ios_config:
    lines:
      - clock timezone {{ ntp_timezone | default('EST') }} -5

- name: Configuration des serveurs Syslog externes
  cisco.ios.ios_logging_global:
    config:
      hosts:
        - hostname: "{{ syslog_server }}"
    state: merged

- name: Configuration des traps SNMPv3
  cisco.ios.ios_config:
    lines:
      - snmp-server group {{ snmp_group }} v3 priv