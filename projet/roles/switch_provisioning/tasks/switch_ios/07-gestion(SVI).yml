---
# roles/switch_provisioning/tasks/07-gestion(SVI).yml
- name: MANAGEMENT PHASE - Configuration IP et Activation de la SVI (Asynchrone)
  cisco.ios.ios_config:
    lines:
      - "ip address {{ management_ip }} {{ management_mask }}"
      - no shutdown
    parents: "interface Vlan{{ management_vlan_id }}"
  async: 10
  poll: 0
  ignore_errors: true

- name: MANAGEMENT PHASE - Configuration de la passerelle par defaut (Global)
  cisco.ios.ios_config:
    lines:
      - "ip default-gateway {{ management_gateway }}"
  async: 10
  poll: 0
  ignore_errors: true

- name: Pause pour permettre la transition reseau
  ansible.builtin.pause:
    seconds: 5